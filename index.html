<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Apps Hub | Pixel Lab</title>
<style>
:root{
  --bg:#f7f8fb;
  --card:#ffffff;
  --muted:#6b7280;
  --accent:#f59e0b;
}
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui;
  /* Fix for background separation */
  min-height: 100vh;
  background: linear-gradient(180deg, var(--bg) 0%, #ffffff 100%);
  background-attachment: fixed;
  color:#0f172a;
}

.wrap{
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:16px;
}

.card{
  background:var(--card);
  border-radius:14px;
  padding:24px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
  cursor:pointer;
  transition:0.2s;
  text-align:center;
  text-decoration: none; /* Removes link underline */
  color: inherit;
  display: block;
}

.card:hover{transform:translateY(-4px)}

.card img{
  width:80px;
  height:80px;
  border-radius:16px;
  object-fit:cover;
  box-shadow:0 6px 18px rgba(15,23,42,0.1);
}

.card h3{margin:16px 0 8px; font-size: 1.25rem;}
.card p{color:var(--muted);font-size:14px; margin: 0;}

h1 { margin-bottom: 30px; }
</style>
</head>
<body>

<div class="wrap">
  <h1>My Apps</h1>
  <div class="grid">

    <a href="privacy-pebble.html" class="card">
      <img src="https://github.com/KOUSTAV2007/gif-host/raw/main/app-icon.png" alt="Pebble Icon">
      <h3>Pebble Notes</h3>
      <p>Simple offline note-taking app</p>
    </a>

    <a href="privacy-stampify.html" class="card">
      <img src="https://github.com/KOUSTAV2007/static-image-host/raw/main/Stampify.png" alt="Stampify Icon">
      <h3>Stampify</h3>
      <p>Smart stamp collection app</p>
    </a>

  </div>
</div>

</body>
</html>
